{% extends "layout.html" %} {% block content %}

<section class="comparison-wrap reveal-up">
  <article class="panel-card comparison-card">
    <p class="eyebrow">Performance Analytics</p>
    <h1>Model Comparison</h1>
    <p class="hero-lead">
      Compare the performance metrics across different model versions:
    </p>

    <figure class="comparison-table-wrapper">
      <table class="comparison-table">
        <thead>
          <tr>
            <th>Model</th>
            <th>Accuracy</th>
            <th>Precision</th>
            <th>Recall</th>
            <th>F1 Score</th>
            <th>ROC AUC</th>
          </tr>
        </thead>
        <tbody>
          {% for model in models %}
          <tr>
            <td class="model-name">{{ model.Model }}</td>
            <td>
              <meter class="performance-meter" low="0.7" high="0.85" max="1" value="{{ model.Accuracy }}"></meter>
              <span>{{ (model.Accuracy * 100)|round(1) }}%</span>
            </td>
            <td>
              <meter class="performance-meter" low="0.7" high="0.85" max="1" value="{{ model.Precision }}"></meter>
              <span>{{ (model.Precision * 100)|round(1) }}%</span>
            </td>
            <td>
              <meter class="performance-meter" low="0.7" high="0.85" max="1" value="{{ model.Recall }}"></meter>
              <span>{{ (model.Recall * 100)|round(1) }}%</span>
            </td>
            <td>
              <meter class="performance-meter" low="0.7" high="0.85" max="1" value="{{ model.F1 }}"></meter>
              <span>{{ (model.F1 * 100)|round(1) }}%</span>
            </td>
            <td>
              {% if model.ROC_AUC %}
                {{ (model.ROC_AUC * 100)|round(1) }}%
              {% else %}
                N/A
              {% endif %}
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </figure>

    <nav class="comparison-actions">
      <a href="/" class="cta-btn cta-secondary">Back to Prediction</a>
    </nav>
  </article>
</section>

{% endblock %}
