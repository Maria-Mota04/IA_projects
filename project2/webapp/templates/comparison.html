{% extends "layout.html" %}
{% block content %}

<section class="comparison-wrap reveal-up">
  <article class="panel-card comparison-card">
    <p class="eyebrow">Análise de desempenho</p>
    <h1>Comparação de modelos</h1>
    <p class="hero-lead">
      Comparação das métricas obtidas pelos modelos treinados:
    </p>

    <figure class="comparison-table-wrapper">
      <table class="comparison-table">
        <thead>
          <tr>
            <th>Model</th>
            <th>Accuracy</th>
            <th>Precision</th>
            <th>Recall</th>
            <th>F1 Score</th>
            <th>ROC AUC</th>
          </tr>
        </thead>

        <tbody>
          {% for model in models %}
          <tr>
            <td class="model-name">
              {{ model.Model or "N/A" }}
            </td>

            <td>
              <meter class="performance-meter"
                     low="0.7" high="0.85" max="1"
                     value="{{ model.Accuracy or 0 }}">
              </meter>
              <span>
                {{ ((model.Accuracy or 0) * 100)|round(1) }}%
              </span>
            </td>

            <td>
              <meter class="performance-meter"
                     low="0.7" high="0.85" max="1"
                     value="{{ model.Precision or 0 }}">
              </meter>
              <span>
                {{ ((model.Precision or 0) * 100)|round(1) }}%
              </span>
            </td>

            <td>
              <meter class="performance-meter"
                     low="0.7" high="0.85" max="1"
                     value="{{ model.Recall or 0 }}">
              </meter>
              <span>
                {{ ((model.Recall or 0) * 100)|round(1) }}%
              </span>
            </td>

            <td>
              <meter class="performance-meter"
                     low="0.7" high="0.85" max="1"
                     value="{{ model.F1 or 0 }}">
              </meter>
              <span>
                {{ ((model.F1 or 0) * 100)|round(1) }}%
              </span>
            </td>

            <td>
              <meter class="performance-meter"
                     low="0.7" high="0.85" max="1"
                     value="{{ model.ROC_AUC or 0 }}">
              </meter>
              <span>
                {{ ((model.ROC_AUC or 0) * 100)|round(1) }}%
              </span>
            </td>
          </tr>
          {% endfor %}
        </tbody>

      </table>
    </figure>

    <nav class="comparison-actions">
      <a href="/" class="cta-btn cta-secondary">Voltar à previsão</a>
    </nav>

  </article>
</section>

{% endblock %}
