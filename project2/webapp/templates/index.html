{% extends "layout.html" %} {% block content %}

<section>
  <header>
    <h1>Find Your Next Theater Experience</h1>
    <p>Enter your preferences to get a personalized theater recommendation.</p>
  </header>

  <article>
    <form id="predictForm">
      <label for="genre">Genre preference (0-10)</label>
      <input type="number" id="genre" name="genre" min="0" max="10" required />

      <label for="budget">Budget level (0-10)</label>
      <input
        type="number"
        id="budget"
        name="budget"
        min="0"
        max="10"
        required
      />

      <button type="submit">Get Recommendation</button>
    </form>
  </article>
</section>

{% endblock %}
