{% extends "layout.html" %} {% block content %}

<section>
  <header>
    <h1>Find Your Next Theater Experience</h1>
    <p>Select your preferences to get personalized recommendations.</p>
  </header>

  <article>
    <form id="predictForm">
      <label for="genre">Genre preference (0-10)</label>
      <input type="number" id="genre" required />

      <label for="budget">Budget level (0-10)</label>
      <input type="number" id="budget" required />

      <button type="submit">Get Recommendation</button>
    </form>
  </article>
</section>

{% endblock %}
